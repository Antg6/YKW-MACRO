name: Build Plugin
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup devkitpro
      run: |
        set -e
        echo "=== Install devkitpro pacman ==="
        wget https://apt.devkitpro.org/install-devkitpro-pacman
        chmod +x ./install-devkitpro-pacman
        sudo ./install-devkitpro-pacman
        sudo dkp-pacman -Syyu --noconfirm
        sudo dkp-pacman -S --needed --noconfirm 3ds-dev
        yes | sudo dkp-pacman -Scc
        echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
        echo "DEVKITARM=/opt/devkitpro/devkitARM" >> $GITHUB_ENV
        echo "/opt/devkitpro/devkitARM/bin" >> $GITHUB_PATH
    - name: Build
      shell: bash
      run: |
        set -e
        mkdir -p build
        arm-none-eabi-gcc \
          -march=armv6k -mtune=mpcore -mfloat-abi=hard -mfpu=vfp \
          -Wall -O2 -mword-relocations -fomit-frame-pointer \
          -ffunction-sections -fno-strict-aliasing \
          -I$DEVKITPRO/libctru/include \
          -nostartfiles \
          source/bootloader.s source/plugin.c source/plgldr.c \
          -L$DEVKITPRO/libctru/lib -lc -lctru -lgcc \
          -Wl,-Map,build/ykw2_farm.map,--gc-sections -T source/3ds.ld \
          -o build/ykw2_farm.elf
        python3 tools/build_3gx.py build/ykw2_farm.elf build/ykw2_farm.3gx ykw2_farm.plgInfo
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ykw2-farm-plugin
        path: build/*.3gx
