name: Build Plugin
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        export DEVKITARM=/opt/devkitpro/devkitARM
        export DEVKITPRO=/opt/devkitpro
        export PATH=$DEVKITARM/bin:$PATH
        mkdir -p build
        arm-none-eabi-gcc \
          -march=armv6k -mtune=mpcore -mfloat-abi=hard -mfpu=vfp \
          -Wall -O2 -mword-relocations -fomit-frame-pointer \
          -ffunction-sections -fno-strict-aliasing \
          -Isource -Iinclude \
          -nostartfiles \
          source/bootloader.s source/csvc.s source/plugin.c source/plgldr.c \
          -L$DEVKITPRO/libctru/lib -lc -lctru -lgcc \
          -Wl,-Map,build/ykw2_farm.map,--gc-sections -T source/3ds.ld \
          -o build/ykw2_farm.elf
        python3 tools/build_3gx.py build/ykw2_farm.elf build/ykw2_farm.3gx tools/ykw2_farm.plgInfo
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ykw2-farm-plugin
        path: build/*.3gx
