name: Build Plugin
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
    - uses: actions/checkout@v4
    - name: Minimal test compile
      shell: bash
      run: |
        echo "=== Test simple compile ==="
        echo 'int x;' | arm-none-eabi-gcc -c -x c - -o /tmp/test.o 2>&1
        echo "=== Simple compile OK ==="
        ls -la /tmp/test.o
    - name: Try plugin.c alone
      shell: bash
      run: |
        DEVKITPRO=/opt/devkitpro
        echo "=== Compile plugin.c ==="
        arm-none-eabi-gcc \
          -march=armv6k -mtune=mpcore -mfloat-abi=hard -mfpu=vfp \
          -Wall -O2 -mword-relocations -fomit-frame-pointer \
          -ffunction-sections -fno-strict-aliasing \
          -I$DEVKITPRO/libctru/include \
          -c source/plugin.c -o plugin.o 2>&1
        echo "=== plugin.c OK ==="
    - name: Build
      shell: bash
      run: |
        set -e
        DEVKITARM=/opt/devkitpro/devkitARM
        DEVKITPRO=/opt/devkitpro
        PATH=$DEVKITARM/bin:$PATH
        mkdir -p build
        arm-none-eabi-gcc \
          -march=armv6k -mtune=mpcore -mfloat-abi=hard -mfpu=vfp \
          -Wall -O2 -mword-relocations -fomit-frame-pointer \
          -ffunction-sections -fno-strict-aliasing \
          -I$DEVKITPRO/libctru/include \
          -nostartfiles \
          source/bootloader.s source/plugin.c source/plgldr.c \
          -L$DEVKITPRO/libctru/lib -lc -lctru -lgcc \
          -Wl,-Map,build/ykw2_farm.map,--gc-sections -T source/3ds.ld \
          -o build/ykw2_farm.elf 2>&1
        python3 tools/build_3gx.py build/ykw2_farm.elf build/ykw2_farm.3gx ykw2_farm.plgInfo 2>&1
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ykw2-farm-plugin
        path: build/*.3gx
