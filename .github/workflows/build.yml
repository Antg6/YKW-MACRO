name: Build Plugin
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
    - uses: actions/checkout@v4
    - name: Diagnose
      run: |
        echo "=== env =="
        env | sort
        echo "=== which arm-none-eabi-gcc ==="
        which arm-none-eabi-gcc
        echo "=== gcc --version ==="
        arm-none-eabi-gcc --version 2>&1 || true
        echo "=== gcc -v ==="
        arm-none-eabi-gcc -v 2>&1 || true
        echo "=== try compile to file ==="
        echo 'int x;' > /tmp/test.c
        arm-none-eabi-gcc -c /tmp/test.c -o /tmp/test.o 2>/tmp/compile_err.txt || true
        echo "gcc rc=$?"
        cat /tmp/compile_err.txt 2>/dev/null || echo "no error file"
        echo "=== try as ==="
        arm-none-eabi-as --version 2>&1 || true
        echo "=== ls /opt/devkitpro/devkitARM/bin/ ==="
        ls /opt/devkitpro/devkitARM/bin/
        echo "=== cc1 location ==="
        find /opt/devkitpro -name cc1 2>/dev/null || echo "cc1 not found"
    - name: Build
      run: |
        set -e
        DEVKITARM=/opt/devkitpro/devkitARM
        DEVKITPRO=/opt/devkitpro
        PATH=$DEVKITARM/bin:$PATH
        mkdir -p build
        arm-none-eabi-gcc \
          -march=armv6k -mtune=mpcore -mfloat-abi=hard -mfpu=vfp \
          -Wall -O2 -mword-relocations -fomit-frame-pointer \
          -ffunction-sections -fno-strict-aliasing \
          -I$DEVKITPRO/libctru/include \
          -nostartfiles \
          source/bootloader.s source/plugin.c source/plgldr.c \
          -L$DEVKITPRO/libctru/lib -lc -lctru -lgcc \
          -Wl,-Map,build/ykw2_farm.map,--gc-sections -T source/3ds.ld \
          -o build/ykw2_farm.elf
        python3 tools/build_3gx.py build/ykw2_farm.elf build/ykw2_farm.3gx ykw2_farm.plgInfo
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ykw2-farm-plugin
        path: build/*.3gx
